<svg viewBox="0 0 1200 800" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#140203" />
      <stop offset="60%" stop-color="#070001" />
      <stop offset="100%" stop-color="#020000" />
    </radialGradient>
    
    <!-- Red Metallic Gradient -->
    <linearGradient id="redMetallic" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF3E47" />
      <stop offset="50%" stop-color="#D60A13" />
      <stop offset="100%" stop-color="#800005" />
    </linearGradient>

    <!-- Silver Metallic Gradient -->
    <linearGradient id="silverMetallic" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="40%" stop-color="#E1E1E1" />
      <stop offset="70%" stop-color="#9C9C9C" />
      <stop offset="100%" stop-color="#6E6E6E" />
    </linearGradient>

    <!-- Red Glow Filter -->
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#000000" flood-opacity="0.8" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bgGlow)" />

  <!-- Diagonal Red Ambient Lights (Top-Left) -->
  <g filter="url(#neonGlow)" opacity="0.8">
    <path d="M-100 -50 L400 -50 L100 20 Z" fill="#FF000D" opacity="0.3" />
    <line x1="-100" y1="-50" x2="300" y2="150" stroke="#FF1E27" stroke-width="4" />
    <line x1="-50" y1="-80" x2="350" y2="120" stroke="#FF1E27" stroke-width="1.5" />
  </g>

  <!-- Diagonal Red Ambient Lights (Bottom-Right) -->
  <g filter="url(#neonGlow)" opacity="0.8">
    <path d="M1300 850 L800 850 L1100 780 Z" fill="#FF000D" opacity="0.3" />
    <line x1="900" y1="650" x2="1300" y2="850" stroke="#FF1E27" stroke-width="4" />
    <line x1="850" y1="680" x2="1250" y2="880" stroke="#FF1E27" stroke-width="1.5" />
  </g>

  <!-- Main Center Container with shadow -->
  <g filter="url(#softShadow)">
    
    <!-- Red Play Logo with R -->
    <g transform="translate(600, 310)">
      <!-- Play Triangle Shadow / Glow -->
      <path d="M -90 -85 L 95 0 L -90 85 Z" fill="#000000" opacity="0.5" transform="translate(0, 5)" />
      
      <!-- Outer red play button structure -->
      <path d="M -85 -80 C -85 -85 -80 -87 -75 -84 L 85 -5 C 90 -2 90 2 85 5 L -75 84 C -80 87 -85 85 -85 80 Z" fill="url(#redMetallic)" />
      
      <!-- Embossed / carved "R" shape cut out in play button -->
      <path d="M -55 -45 L -20 -45 C 5 -45 15 -35 15 -18 C 15 -2 -2 -2 -15 -2 L -35 -2 L -35 45 L -55 45 Z 
               M -35 -28 L -22 -28 C -10 -28 -5 -32 -5 -38 C -5 -44 -10 -45 -20 -45 L -35 -45 Z" fill="#120102" />
      <path d="M -15 -2 L 10 45 L 32 45 L 5 -2 Z" fill="#120102" />
    </g>

    <!-- RED STREAM Text -->
    <g transform="translate(600, 480)" text-anchor="middle">
      <text font-family="'Space Grotesk', 'Inter', sans-serif" font-weight="900" font-size="76" letter-spacing="4">
        <tspan fill="url(#redMetallic)">RED</tspan>
        <tspan fill="url(#silverMetallic)">STREAM</tspan>
      </text>
      <!-- Trademark symbol -->
      <text x="325" y="-45" font-family="'Inter', sans-serif" font-weight="bold" font-size="20" fill="#8E8E8E">TM</text>
    </g>

    <!-- Red BLOG Banner Badge -->
    <g transform="translate(600, 550)">
      <!-- Sleek slanted polygon badge for "BLOG" -->
      <polygon points="-160 -25, 160 -25, 140 25, -140 25" fill="url(#redMetallic)" stroke="#FF5C64" stroke-width="1.5" />
      
      <!-- Outer shine reflection -->
      <line x1="-150" y1="-23" x2="150" y2="-23" stroke="#FFFFFF" stroke-opacity="0.2" stroke-width="1" />

      <!-- Text "BLOG" in white -->
      <text y="8" font-family="'Space Grotesk', 'Inter', sans-serif" font-weight="900" font-size="26" fill="#FFFFFF" letter-spacing="12" text-anchor="middle">BLOG</text>
    </g>

  </g>
</svg>
