<svg viewBox="0 0 1200 800" width="1200" height="800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#121212" />
      <stop offset="60%" stop-color="#070707" />
      <stop offset="100%" stop-color="#000000" />
    </radialGradient>
    
    <!-- Red Metallic Gradient for Logo -->
    <linearGradient id="redMetallic" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF3E47" />
      <stop offset="50%" stop-color="#E50914" />
      <stop offset="100%" stop-color="#7C0003" />
    </linearGradient>

    <!-- Silver Metallic Gradient for Text -->
    <linearGradient id="silverMetallic" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="50%" stop-color="#E1E1E1" />
      <stop offset="100%" stop-color="#A1A1A1" />
    </linearGradient>

    <!-- Glowing effect -->
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#000000" flood-opacity="0.9" />
    </filter>
  </defs>

  <!-- Background Canvas -->
  <rect width="100%" height="100%" fill="url(#bgGlow)" />

  <!-- Diagonal Red Neon Accent Lines (Top-Left Corner) -->
  <g filter="url(#neonGlow)" opacity="0.6">
    <line x1="-150" y1="20" x2="350" y2="-150" stroke="#FF1E27" stroke-width="6" />
    <line x1="-100" y1="40" x2="300" y2="-120" stroke="#FF1E27" stroke-width="2.5" />
    <line x1="-50" y1="60" x2="250" y2="-90" stroke="#FF1E27" stroke-width="1.5" />
  </g>

  <!-- Diagonal Red Neon Accent Lines (Bottom-Right Corner) -->
  <g filter="url(#neonGlow)" opacity="0.6">
    <line x1="850" y1="890" x2="1350" y2="690" stroke="#FF1E27" stroke-width="6" />
    <line x1="900" y1="870" x2="1300" y2="710" stroke="#FF1E27" stroke-width="2.5" />
    <line x1="950" y1="850" x2="1250" y2="730" stroke="#FF1E27" stroke-width="1.5" />
  </g>

  <!-- MAIN CENTER BRAND BLOCK -->
  <g filter="url(#softShadow)" transform="translate(600, 240)">
    
    <!-- 3D Red Play Triangle with stylized R inside -->
    <g transform="translate(0, 0) scale(1.1)">
      <!-- Drop Shadow -->
      <path d="M -80 -75 L 85 0 L -80 75 Z" fill="#000000" opacity="0.6" transform="translate(0, 8)" />
      
      <!-- Outer metallic red play button -->
      <path d="M -75 -70 C -75 -75 -70 -77 -65 -74 L 75 -5 C 80 -2 80 2 75 5 L -65 74 C -70 77 -75 75 -75 70 Z" fill="url(#redMetallic)" />
      
      <!-- Styled carved R letter inside play button -->
      <path d="M -45 -40 L -15 -40 C 5 -40 13 -32 13 -16 C 13 -2 -2 -2 -12 -2 L -28 -2 L -28 40 L -45 40 Z 
               M -28 -24 L -16 -24 C -7 -24 -3 -27 -3 -32 C -3 -37 -7 -38 -15 -38 L -28 -38 Z" fill="#0c0c0c" />
      <path d="M -12 -2 L 8 40 L 26 40 L 4 -2 Z" fill="#0c0c0c" />
    </g>

    <!-- Brand Label REDSTREAM -->
    <g transform="translate(0, 145)" text-anchor="middle">
      <text font-family="'Outfit', 'Inter', sans-serif" font-weight="900" font-size="80" letter-spacing="4">
        <tspan fill="url(#redMetallic)">RED</tspan>
        <tspan fill="url(#silverMetallic)">STREAM</tspan>
      </text>
      <!-- Trademark logo -->
      <text x="345" y="-50" font-family="'Inter', sans-serif" font-weight="bold" font-size="20" fill="#9ca3af">TM</text>
    </g>

    <!-- Subtitle divider element -->
    <g transform="translate(0, 220)">
      <!-- Left side line -->
      <line x1="-380" y1="-8" x2="-220" y2="-8" stroke="#7C0003" stroke-width="2.5" />
      
      <!-- Subtitle Text -->
      <text font-family="'Inter', sans-serif" font-weight="700" font-size="26" text-anchor="middle" fill="#FFFFFF">
        One Subscription. <tspan fill="#E50914">Endless Entertainment.</tspan>
      </text>
      
      <!-- Right side line -->
      <line x1="220" y1="-8" x2="380" y2="-8" stroke="#7C0003" stroke-width="2.5" />
    </g>
  </g>

  <!-- BOTTOM FEATURES COLS (5 Column Layout with dividers) -->
  <g transform="translate(100, 580)">
    
    <!-- Column 1: Live Channels -->
    <g transform="translate(0, 0)">
      <!-- TV Icon -->
      <rect x="52" y="0" width="56" height="42" rx="5" stroke="#E50914" stroke-width="2.5" fill="none" />
      <polygon points="74,13 74,29 88,21" fill="#E50914" />
      <line x1="68" y1="42" x2="60" y2="52" stroke="#E50914" stroke-width="2.5" />
      <line x1="92" y1="42" x2="100" y2="52" stroke="#E50914" stroke-width="2.5" />
      <line x1="60" y1="52" x2="100" y2="52" stroke="#E50914" stroke-width="2.5" />
      
      <!-- Text -->
      <text x="80" y="85" font-family="'Outfit', sans-serif" font-weight="800" font-size="26" fill="#FFFFFF" text-anchor="middle">10,000+</text>
      <text x="80" y="112" font-family="'Inter', sans-serif" font-weight="600" font-size="14" fill="#9ca3af" text-anchor="middle" letter-spacing="0.5">Live Channels</text>
    </g>

    <!-- Divider 1 -->
    <line x1="200" y1="10" x2="200" y2="110" stroke="rgba(229, 9, 20, 0.2)" stroke-width="1.5" />

    <!-- Column 2: Movies & Series -->
    <g transform="translate(200, 0)">
      <!-- Clapperboard Icon -->
      <path d="M 50,15 L 110,15 L 110,50 L 50,50 Z" stroke="#E50914" stroke-width="2.5" fill="none" stroke-linejoin="round" />
      <line x1="50" y1="25" x2="110" y2="25" stroke="#E50914" stroke-width="2.5" />
      <line x1="65" y1="15" x2="75" y2="25" stroke="#E50914" stroke-width="2" />
      <line x1="85" y1="15" x2="95" y2="25" stroke="#E50914" stroke-width="2" />
      <polygon points="74,31 74,44 86,37.5" fill="#E50914" />
      
      <!-- Text -->
      <text x="80" y="85" font-family="'Outfit', sans-serif" font-weight="800" font-size="26" fill="#FFFFFF" text-anchor="middle">50,000+</text>
      <text x="80" y="112" font-family="'Inter', sans-serif" font-weight="600" font-size="14" fill="#9ca3af" text-anchor="middle" letter-spacing="0.5">Movies &amp; Series</text>
    </g>

    <!-- Divider 2 -->
    <line x1="400" y1="10" x2="400" y2="110" stroke="rgba(229, 9, 20, 0.2)" stroke-width="1.5" />

    <!-- Column 3: Uptime -->
    <g transform="translate(400, 0)">
      <!-- Shield Check Icon -->
      <path d="M 55,5 C 75,5 80,0 80,0 C 80,0 85,5 105,5 C 105,5 105,35 80,52 C 55,35 55,5 55,5 Z" stroke="#E50914" stroke-width="2.5" fill="none" stroke-linejoin="round" />
      <path d="M 68,24 L 76,32 L 92,16" stroke="#E50914" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round" />
      
      <!-- Text -->
      <text x="80" y="85" font-family="'Outfit', sans-serif" font-weight="800" font-size="26" fill="#FFFFFF" text-anchor="middle">99.9%</text>
      <text x="80" y="112" font-family="'Inter', sans-serif" font-weight="600" font-size="14" fill="#9ca3af" text-anchor="middle" letter-spacing="0.5">Uptime</text>
    </g>

    <!-- Divider 3 -->
    <line x1="600" y1="10" x2="600" y2="110" stroke="rgba(229, 9, 20, 0.2)" stroke-width="1.5" />

    <!-- Column 4: Device Compatibility -->
    <g transform="translate(600, 0)">
      <!-- TV & Phone Screen Icon -->
      <rect x="42" y="2" width="62" height="40" rx="4" stroke="#E50914" stroke-width="2.5" fill="none" />
      <line x1="63" y1="42" x2="63" y2="50" stroke="#E50914" stroke-width="2.5" />
      <line x1="83" y1="42" x2="83" y2="50" stroke="#E50914" stroke-width="2.5" />
      <line x1="55" y1="50" x2="91" y2="50" stroke="#E50914" stroke-width="2.5" />
      
      <!-- Mobile Overlay -->
      <rect x="90" y="18" width="18" height="32" rx="3" stroke="#E50914" stroke-width="2" fill="#070707" />
      <line x1="95" y1="46" x2="103" y2="46" stroke="#E50914" stroke-width="1.5" />
      
      <!-- Text -->
      <text x="73" y="85" font-family="'Outfit', sans-serif" font-weight="800" font-size="24" fill="#FFFFFF" text-anchor="middle">All Devices</text>
      <text x="73" y="112" font-family="'Inter', sans-serif" font-weight="600" font-size="14" fill="#9ca3af" text-anchor="middle" letter-spacing="0.5">Compatible</text>
    </g>

    <!-- Divider 4 -->
    <line x1="800" y1="10" x2="800" y2="110" stroke="rgba(229, 9, 20, 0.2)" stroke-width="1.5" />

    <!-- Column 5: 24/7 Support -->
    <g transform="translate(800, 0)">
      <!-- Headphones Icon -->
      <path d="M 50,32 C 50,14 63,5 80,5 C 97,5 110,14 110,32" stroke="#E50914" stroke-width="2.5" fill="none" stroke-linecap="round" />
      <rect x="45" y="26" width="10" height="15" rx="2" fill="#E50914" />
      <rect x="105" y="26" width="10" height="15" rx="2" fill="#E50914" />
      <path d="M 105,36 C 90,46 72,46 68,40" stroke="#E50914" stroke-width="2" fill="none" stroke-linecap="round" />
      
      <!-- Support Badge inside headphones -->
      <rect x="62" y="16" width="36" height="18" rx="3" fill="#E50914" />
      <text x="80" y="29" font-family="'Outfit', sans-serif" font-weight="800" font-size="10" fill="#FFFFFF" text-anchor="middle">24/7</text>

      <!-- Text -->
      <text x="80" y="85" font-family="'Outfit', sans-serif" font-weight="800" font-size="26" fill="#FFFFFF" text-anchor="middle">24/7</text>
      <text x="80" y="112" font-family="'Inter', sans-serif" font-weight="600" font-size="14" fill="#9ca3af" text-anchor="middle" letter-spacing="0.5">Support</text>
    </g>
  </g>
</svg>
